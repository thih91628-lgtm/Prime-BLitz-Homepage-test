<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="5;suc-in.html">
    <title>Authenticating Profile...</title>
    <style>
        /* BASE SETUP */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 0;
        }

        .auth-page-wrapper {
            box-sizing: border-box;
            min-height: 100vh;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* MAIN CARD CONTAINER */
        .auth-page-wrapper .auth-display-card {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 900px;
            max-width: 100%;
            min-height: 560px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-page-wrapper .auth-loading-body {
            width: 100%;
            max-width: 450px;
            padding: 40px 24px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ROTATING SPINNER ELEMENT SPECS */
        .auth-page-wrapper .loading-spinner-ring {
            width: 64px;
            height: 64px;
            border: 5px solid #e5e7eb;
            border-top: 5px solid #2563eb;
            border-radius: 50%;
            margin-bottom: 32px;
            animation: spinTrack 1s linear infinite;
        }

        /* TYPOGRAPHY */
        .auth-page-wrapper .auth-heading {
            font-size: 2rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 10px;
            letter-spacing: -0.025em;
        }

        .auth-page-wrapper .auth-lead {
            font-size: 0.925rem;
            color: #4b5563;
            line-height: 1.5;
        }

        /* LOOPED ROTATION ANIMATION */
        @keyframes spinTrack {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* PULSING ACCENT TEXT ATTRIBUTE */
        .auth-page-wrapper .animate-pulse {
            animation: textPulse 1.8s ease-in-out infinite;
        }

        @keyframes textPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* MOBILE RESPONSIVENESS */
        @media (max-width: 768px) {
            .auth-page-wrapper {
                padding: 40px 16px;
            }

            .auth-page-wrapper .auth-display-card {
                min-height: 480px;
            }

            .auth-page-wrapper .auth-heading {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>

    <main class="auth-page-wrapper">
        <div class="auth-display-card">
            <div class="auth-loading-body">
                <div class="loading-spinner-ring"></div>
                
                <h1 class="auth-heading">Authenticating Profile</h1>
                <p class="auth-lead animate-pulse">Establishing secure handshake tunnels with Prime Blitz systems. Please wait...</p>
            </div>
        </div>
    </main>

</body>
</html>
