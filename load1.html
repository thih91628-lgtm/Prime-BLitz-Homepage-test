<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setting Up Workspace...</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta http-equiv="refresh" content="5;url=suc-up.html">
    <style>
        /* BASE SETUP */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 0;
        }

        .auth-page-wrapper {
            box-sizing: border-box;
            min-height: 100vh;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* MAIN CARD CONTAINER */
        .auth-page-wrapper .auth-display-card {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 900px;
            max-width: 100%;
            min-height: 560px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-page-wrapper .auth-loading-body {
            width: 100%;
            max-width: 450px;
            padding: 40px 24px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* SECURITY SECURE BADGE SPECIFICATION */
        .auth-page-wrapper .loading-secure-badge {
            font-size: 3.5rem;
            color: #111827;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* TYPOGRAPHY */
        .auth-page-wrapper .auth-heading {
            font-size: 2rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 10px;
            letter-spacing: -0.025em;
        }

        .auth-page-wrapper .auth-lead {
            font-size: 0.925rem;
            color: #4b5563;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        /* PROGRESS BAR COMPONENT HOLDER */
        .auth-page-wrapper .loading-bar-track {
            width: 100%;
            max-width: 280px;
            height: 6px;
            background-color: #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        /* PROGRESS BAR ACCELERATOR SLIDER FILL */
        .auth-page-wrapper .loading-bar-fill-line {
            position: absolute;
            height: 100%;
            width: 40%;
            background-color: #2563eb;
            border-radius: 10px;
            left: -40%;
            animation: linearSlide 1.5s ease-in-out infinite;
        }

        /* HORIZONTAL LINE SLIDE ENGINE AUTOMATIONS */
        @keyframes linearSlide {
            0% { left: -40%; width: 30%; }
            50% { width: 50%; }
            100% { left: 110%; width: 20%; }
        }

        /* MOBILE MEDIA CODES VIEW SCALER RULES */
        @media (max-width: 768px) {
            .auth-page-wrapper {
                padding: 40px 16px;
            }

            .auth-page-wrapper .auth-display-card {
                min-height: 480px;
            }

            .auth-page-wrapper .loading-secure-badge {
                font-size: 3rem;
            }

            .auth-page-wrapper .auth-heading {
                font-size: 1.75rem;
            }

            .auth-page-wrapper .loading-bar-track {
                max-width: 220px;
            }
        }
    </style>
</head>
<body>

    <main class="auth-page-wrapper">
        <div class="auth-display-card">
            <div class="auth-loading-body">
                <div class="loading-secure-badge">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                
                <h1 class="auth-heading">Setting Up Workspace</h1>
                <p class="auth-lead">Preparing secure environment components and database initialization tracks.</p>
                
                <div class="loading-bar-track">
                    <div class="loading-bar-fill-line"></div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
